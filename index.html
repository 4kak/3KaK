<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3KaK</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e2028;
      --bg2: #252830;
      --blue: #4a6fa5;
      --blue-light: #6b8fc7;
      --blue-dim: #2e4a72;
      --accent: #f0c040;
      --text: #c8cdd8;
      --text-dim: #6b7280;
      --border: #2e3340;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      top: 0; bottom: 0;
      width: 3px;
      background: var(--blue);
      z-index: 100;
    }
    body::before { left: 12px; }
    body::after  { right: 12px; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 99;
      display: flex;
      justify-content: flex-end;
      gap: 2rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(to bottom, rgba(30,32,40,0.95), transparent);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    nav a {
      color: var(--blue-light);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }

    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(74,111,165,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-logo {
      width: min(320px, 80vw);
      margin-bottom: 0.2rem;

    }
    .hero-logo img {
      width: 100%;
      height: auto;
      display: block;
    }

    .hero-name {
      width: min(600px, 90vw);
      margin-bottom: 1rem;
    }
    .hero-name img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* fallback text if images not set yet */
    .hero-name-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 15vw, 9rem);
      letter-spacing: 0.05em;
      color: var(--blue-light);
      line-height: 0.9;
      text-shadow: 4px 4px 0 var(--blue-dim), -2px -2px 0 rgba(74,111,165,0.3);
    }

    .hero-sub {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 0.5rem;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    section {
      padding: 5rem 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.5rem;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--text);
      letter-spacing: 0.05em;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease, filter 0.4s ease;
      filter: saturate(0.85);
    }

    .gallery-item:hover img {
      transform: scale(1.04);
      filter: saturate(1.1);
    }

    .gallery-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.75rem 1rem;
      background: linear-gradient(to top, rgba(30,32,40,0.95), transparent);
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blue-light);
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    .gallery-item:hover .gallery-caption {
      transform: translateY(0);
    }

    .gallery-empty {
      grid-column: 1 / -1;
      padding: 3rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      border: 1px dashed var(--border);
    }

    .about-body {
      font-size: 0.8rem;
      line-height: 2;
      color: var(--text);
      max-width: 600px;
    }
    .about-body strong { color: var(--blue-light); }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .contact-list li {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .contact-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      width: 60px;
      flex-shrink: 0;
    }

    .contact-link {
      color: var(--blue-light);
      text-decoration: none;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--blue-dim);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,11,15,0.95);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
    }
    #lightbox-close {
      position: absolute;
      top: 1.5rem; right: 2rem;
      font-size: 1.5rem;
      color: var(--text-dim);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
    }
    #lightbox-close:hover { color: var(--accent); }

    @media (max-width: 600px) {
      nav { gap: 1rem; font-size: 0.6rem; padding: 0.75rem 1.5rem; }
      section { padding: 4rem 1.25rem; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#gallery">Works</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <section id="hero">
    <!-- 三角ロゴ画像：images/logo-mark.png に置き換えてください -->
    <div class="hero-logo">
      <img src="images/logo-mark.png" alt="3KaK logo mark"
           onerror="this.style.display='none'" />
    </div>
    <!-- 3KaK文字ロゴ画像：images/logo-text.png に置き換えてください -->
    <div class="hero-name">
      <img src="images/logo-text.png" alt="3KaK"
           onerror="this.style.display='none'; document.getElementById('hero-fallback').style.display='block'" />
    </div>
    <h1 class="hero-name-text" id="hero-fallback" style="display:none">3KaK</h1>
    <p class="hero-sub">Graffiti × Logo × Motif</p>
    <span class="scroll-hint">▼ scroll</span>
  </section>

  <section id="gallery">
    <p class="section-label">// portfolio</p>
    <h2 class="section-title">Gallery</h2>
    <div class="gallery-grid" id="gallery-grid">
      <div class="gallery-empty">Loading works...</div>
    </div>
  </section>

  <section id="about">
    <p class="section-label">// profile</p>
    <h2 class="section-title">About</h2>
    <div class="about-body">
      <p>
        <strong>3KaK</strong> — Illustrator based in Japan.<br /><br />
        <br />ﾗｸｶﾞｸ◬<br />
        Commission → X or Mail
      </p>
    </div>
  </section>

  <section id="contact">
    <p class="section-label">// contact</p>
    <h2 class="section-title">Contact</h2>
    <ul class="contact-list">
      <li>
        <span class="contact-label">Mail</span>
        <a class="contact-link" href="mailto:3kako0@gmail.com">3kako0@gmail.com</a>
      </li>
      <li>
        <span class="contact-label">X</span>
        <a class="contact-link" href="https://x.com/_3kak_" target="_blank" rel="noopener">@_3kak_</a>
      </li>
    </ul>
  </section>

  <footer>
    &copy; 2025 3KaK — All rights reserved.
  </footer>

  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script>
    // ギャラリー読み込み
    async function loadGallery() {
      const grid = document.getElementById('gallery-grid');
      try {
        const res = await fetch('images/images.json');
        if (!res.ok) throw new Error('not found');
        const files = await res.json();
        if (!files.length) throw new Error('empty');

        grid.innerHTML = '';
        files.forEach(filename => {
          const name = filename.replace(/\.[^.]+$/, '');
          const item = document.createElement('div');
          item.className = 'gallery-item';
          item.innerHTML = `
            <img src="images/${filename}" alt="${name}" loading="lazy" />
            <div class="gallery-caption">${name}</div>
          `;
          item.querySelector('img').addEventListener('click', () => openLightbox(`images/${filename}`, name));
          grid.appendChild(item);
        });
      } catch {
        grid.innerHTML = '<div class="gallery-empty">// works coming soon</div>';
      }
    }

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbClose  = document.getElementById('lightbox-close');

    function openLightbox(src, alt) {
      lbImg.src = src;
      lbImg.alt = alt;
      lightbox.classList.add('open');
    }

    lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') lightbox.classList.remove('open');
    });

    loadGallery();
  </script>

</body>
</html>
