<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3KaK</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e2028;
      --bg2: #252830;
      --blue: #4a6fa5;
      --blue-light: #6b8fc7;
      --blue-dim: #2e4a72;
      --accent: #f0c040;
      --text: #c8cdd8;
      --text-dim: #6b7280;
      --border: #2e3340;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      top: 0; bottom: 0;
      width: 3px;
      background: var(--blue);
      z-index: 100;
    }
    body::before { left: 12px; }
    body::after  { right: 12px; }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 99;
      display: flex;
      justify-content: flex-end;
      gap: 2rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(to bottom, rgba(30,32,40,0.95), transparent);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    nav a {
      color: var(--blue-light);
      text-decoration: none;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--accent); }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(74,111,165,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-logo {
      width: min(320px, 80vw);
      margin-bottom: 0.2rem;
    }
    .hero-logo img { width: 100%; height: auto; display: block; }

    .hero-name {
      width: min(600px, 90vw);
      margin-bottom: 1rem;
    }
    .hero-name img { width: 100%; height: auto; display: block; }

    .hero-name-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 15vw, 9rem);
      letter-spacing: 0.05em;
      color: var(--blue-light);
      line-height: 0.9;
      text-shadow: 4px 4px 0 var(--blue-dim), -2px -2px 0 rgba(74,111,165,0.3);
    }

    .hero-sub {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 0.5rem;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* ── GALLERY ── */
    #gallery {
      padding: 5rem 2rem 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 0.5rem;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--text);
      letter-spacing: 0.05em;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    /* ステッカーボード */
    .sticker-board {
      position: relative;
      width: 100%;
      min-height: 500px;
      margin-bottom: 4rem;
    }

    .sticker {
      position: absolute;
      cursor: pointer;
      transition: transform 0.25s ease, z-index 0s, filter 0.25s ease;
      transform-origin: center center;
      will-change: transform;
    }

    .sticker:hover,
    .sticker:focus {
      z-index: 100 !important;
      filter: drop-shadow(0 8px 24px rgba(74,111,165,0.5)) !important;
      outline: none;
    }

    /* ホバー時に rotate を 0 にしてスケールアップ（JSで制御） */
    .sticker img {
      display: block;
      width: 100%;
      height: auto;
      filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.7));
      pointer-events: none;
      border-radius: 2px;
    }

    .sticker-empty {
      color: var(--text-dim);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      padding: 3rem;
      border: 1px dashed var(--border);
      text-align: center;
    }

    /* ── ABOUT / CONTACT ── */
    section {
      padding: 5rem 2rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .about-body {
      font-size: 0.8rem;
      line-height: 2;
      color: var(--text);
      max-width: 600px;
    }
    .about-body strong { color: var(--blue-light); }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .contact-list li {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .contact-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      width: 60px;
      flex-shrink: 0;
    }
    .contact-link {
      color: var(--blue-light);
      text-decoration: none;
      font-size: 0.85rem;
      border-bottom: 1px solid var(--blue-dim);
      padding-bottom: 2px;
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-link:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    footer {
      text-align: center;
      padding: 3rem 2rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
    }

    /* ── LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,11,15,0.96);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 2px;
    }
    #lightbox-close {
      position: absolute;
      top: 1.5rem; right: 2rem;
      font-size: 1.5rem;
      color: var(--text-dim);
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Space Mono', monospace;
    }
    #lightbox-close:hover { color: var(--accent); }

    @media (max-width: 600px) {
      nav { gap: 1rem; font-size: 0.6rem; padding: 0.75rem 1.5rem; }
      section { padding: 4rem 1.25rem; }
      #gallery { padding: 4rem 1.25rem 1rem; }
      .sticker-board { min-height: 360px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#gallery">Gallery</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- HERO -->
  <section id="hero">
    <div class="hero-logo">
      <img src="images/logo-text.png"
" alt="3KaK logo mark" onerror="this.style.display='none'" />
    </div>
    <div class="hero-name">
      <img src="images/logo-mark.png"
" alt="3KaK" onerror="this.style.display='none'; document.getElementById('hero-fallback').style.display='block'" />
    </div>
    <h1 class="hero-name-text" id="hero-fallback" style="display:none">3KaK</h1>
    <p class="hero-sub">Graffiti × Logo × Motif</p>
    <span class="scroll-hint">▼ scroll</span>
  </section>

  <!-- GALLERY -->
  <div id="gallery">
    <p class="section-label">// portfolio</p>
    <h2 class="section-title">Gallery</h2>
    <div class="sticker-board" id="sticker-board">
      <div class="sticker-empty">Loading works...</div>
    </div>
  </div>

  <!-- ABOUT -->
  <section id="about">
    <p class="section-label">// profile</p>
    <h2 class="section-title">About</h2>
    <div class="about-body">
      <p>
        <strong>3KaK</strong> — Illustrator based in Japan.<br /><br />
        ﾗｸｶﾞｸ◬<br />
        Commission → X or Mail
      </p>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <p class="section-label">// contact</p>
    <h2 class="section-title">Contact</h2>
    <ul class="contact-list">
      <li>
        <span class="contact-label">Mail</span>
        <a class="contact-link" href="mailto:3kako0@gmail.com">3kako0@gmail.com</a>
      </li>
      <li>
        <span class="contact-label">X</span>
        <a class="contact-link" href="https://x.com/_3kak_" target="_blank" rel="noopener">@_3kak_</a>
      </li>
    </ul>
  </section>

  <footer>
    &copy; 2025 3KaK — All rights reserved.
  </footer>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <script>
    // シード付き疑似乱数（毎回同じ配置）
    function makeRand(seed) {
      let s = seed;
      return () => {
        s = (s * 9301 + 49297) % 233280;
        return s / 233280;
      };
    }

    async function loadGallery() {
      const board = document.getElementById('sticker-board');
      try {
        const res = await fetch('images/images.json');
        if (!res.ok) throw new Error();
        const files = await res.json();
        if (!files.length) throw new Error();

        board.innerHTML = '';

        const boardW = board.offsetWidth || window.innerWidth - 48;
        const isMobile = boardW < 500;
        const stickerW = isMobile
          ? Math.floor(boardW * 0.42)
          : Math.floor(boardW * 0.28);

        // グリッドベースにランダムオフセットで散らばらせる
        const cols = isMobile ? 2 : 3;
        const rows = Math.ceil(files.length / cols);
        const cellW = boardW / cols;
        const cellH = stickerW * 1.2;
        const totalH = rows * cellH + stickerW * 0.6;
        board.style.minHeight = totalH + 'px';

        const rand = makeRand(7);
        const rotSet = [-14, -10, -7, -4, -2, 2, 4, 7, 10, 14];

        // zIndexをシャッフル
        const zArr = files.map((_, i) => i + 1);
        for (let i = zArr.length - 1; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          [zArr[i], zArr[j]] = [zArr[j], zArr[i]];
        }

        files.forEach((filename, i) => {
          const col = i % cols;
          const row = Math.floor(i / cols);

          const baseX = col * cellW + (cellW - stickerW) / 2;
          const baseY = row * cellH;
          const ox = (rand() - 0.5) * cellW * 0.45;
          const oy = (rand() - 0.5) * cellH * 0.3;
          const rot = rotSet[Math.floor(rand() * rotSet.length)];
          const z = zArr[i];

          const x = Math.max(0, Math.min(boardW - stickerW, baseX + ox));
          const y = Math.max(0, baseY + oy);

          const el = document.createElement('div');
          el.className = 'sticker';
          el.tabIndex = 0;
          el.style.cssText = `left:${x}px;top:${y}px;width:${stickerW}px;z-index:${z};transform:rotate(${rot}deg);`;

          const img = document.createElement('img');
          img.src = filename;
          img.alt = filename.replace(/\.[^.]+$/, '');
          img.loading = 'lazy';
          el.appendChild(img);

          // ホバー：rotate 0 + scale up
          el.addEventListener('mouseenter', () => {
            el.style.transform = 'rotate(0deg) scale(1.12)';
          });
          el.addEventListener('mouseleave', () => {
            el.style.transform = `rotate(${rot}deg) scale(1)`;
          });
          el.addEventListener('focus', () => {
            el.style.transform = 'rotate(0deg) scale(1.12)';
          });
          el.addEventListener('blur', () => {
            el.style.transform = `rotate(${rot}deg) scale(1)`;
          });

          // クリックでライトボックス
          el.addEventListener('click', () => openLightbox(filename, img.alt));
          el.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') openLightbox(filename, img.alt);
          });

          board.appendChild(el);
        });

      } catch {
        board.innerHTML = '<div class="sticker-empty">// works coming soon</div>';
      }
    }

    // Lightbox
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const lbClose  = document.getElementById('lightbox-close');

    function openLightbox(src, alt) {
      lbImg.src = src;
      lbImg.alt = alt;
      lightbox.classList.add('open');
    }

    lbClose.addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') lightbox.classList.remove('open');
    });

    window.scrollTo(0, 0);
    loadGallery();
  </script>

</body>
</html>
